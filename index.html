<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>linkedin-fighter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23111'/><text x='16' y='24' font-size='22' text-anchor='middle' font-family='Arial Black'>🥊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      background: #000;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
      pointer-events: none;
      z-index: 100;
    }
    .page { position: relative; z-index: 2; width: min(98vw, 1100px); padding: 0.8rem 1rem; }

    /* Title */
    .title { text-align: center; margin-bottom: 0.5rem; }
    .title-main { font-size: clamp(16px, 3.2vw, 28px); color: #ffcc00; text-shadow: 2px 2px 0 #996600, 4px 4px 0 #663300; letter-spacing: 3px; }
    .title-sub { display: block; font-size: clamp(5px, 0.8vw, 6px); color: #aa7733; letter-spacing: 4px; margin-top: 3px; }

    /* HUD */
    .hud { display: grid; grid-template-columns: 1fr 36px 1fr; align-items: end; margin-bottom: 0.3rem; gap: 4px; }
    .hud-side { display: flex; flex-direction: column; gap: 2px; }
    .hud-name { font-size: clamp(6px, 1vw, 8px); letter-spacing: 2px; color: #aaa; }
    .hud-name.right { text-align: right; }
    .hp-bar { height: 18px; border: 2px solid #ffcc00; background: #111; position: relative; overflow: hidden; }
    .hp-bar::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent calc(10% - 1px), rgba(0,0,0,0.35) calc(10% - 1px), rgba(0,0,0,0.35) 10%); z-index: 2; pointer-events: none; }
    .hp-fill { position: absolute; top: 0; bottom: 0; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); z-index: 1; }
    .hp-fill.chris-hp { right: 0; background: linear-gradient(270deg, #ffcc00, #cc9900); }
    .hp-fill.ruben-hp { left: 0; background: linear-gradient(90deg, #cc9900, #ffcc00); }
    .hp-fill.critical { animation: hp-flash 0.3s steps(2) infinite; }
    @keyframes hp-flash { 0%,100%{opacity:1} 50%{opacity:.4} }
    .hud-vs { text-align: center; font-size: clamp(9px, 1.6vw, 13px); color: #ffcc00; align-self: center; }

    /* Arena */
    .arena {
      position: relative;
      background: radial-gradient(ellipse at 50% 90%, #110a1e 0%, #050008 70%);
      border: 1px solid #1a1a1a;
      border-bottom: 2px solid #ffcc0055;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 3rem;
      height: clamp(160px, 22vw, 210px);
      overflow: hidden;
    }
    .arena::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 2px; background: radial-gradient(ellipse, #ffcc0033, transparent); }
    .fighter-side { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
    .fighter-side img { width: clamp(80px, 14vw, 120px); height: auto; image-rendering: pixelated; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); transition: filter 0.3s; }
    .fighter-side.left img { transform: scaleX(-1); }
    .fighter-side.hit img { filter: brightness(3) drop-shadow(0 0 20px #fff); }
    .fighter-side.hurt img { filter: brightness(0.3) sepia(0.5); }
    .fighter-label { text-align: center; margin-bottom: 2px; }
    .fighter-label .count { font-size: clamp(9px, 1.5vw, 12px); color: #fff; }
    .fighter-label .daily { font-size: clamp(5px, 0.8vw, 7px); color: #999; }
    .fighter-label .daily.up { color: #ffcc00; }
    /* Gap bar sits BELOW the arena, not inside it */
    .gap-row {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-top: none;
      padding: 6px 0;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .gap-row-num { font-size: clamp(12px, 2.2vw, 18px); color: #ffcc00; display: inline; }
    .gap-row-lbl { font-size: clamp(4px, 0.6vw, 5px); color: #888; letter-spacing: 1px; margin-left: 8px; }

    .hit-effect { position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%); font-size: clamp(26px, 5vw, 44px); color: #ffcc00; text-shadow: 0 0 30px #ffcc00, 0 0 60px #996600; z-index: 10; opacity: 0; pointer-events: none; }
    .hit-effect.show { animation: hit-pop 1s ease-out forwards; }
    @keyframes hit-pop { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)} 15%{opacity:1;transform:translate(-50%,-50%) scale(1.3)} 30%{transform:translate(-50%,-50%) scale(1)} 70%{opacity:1} 100%{opacity:0;transform:translate(-50%,-55%) scale(1.1)} }
    .shake { animation: screen-shake 0.35s ease-out; }
    @keyframes screen-shake { 0%{transform:translate(0)} 25%{transform:translate(-4px,2px)} 50%{transform:translate(3px,-2px)} 75%{transform:translate(-2px,1px)} 100%{transform:translate(0)} }

    /* Milestone */
    .milestone-bar { margin-bottom: 0.5rem; }
    .milestone-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .milestone-round { font-size: clamp(5px, 0.8vw, 7px); color: #999; letter-spacing: 2px; }
    .milestone-target { font-size: clamp(7px, 1.2vw, 10px); color: #ffcc00; letter-spacing: 1px; }
    .milestone-track { height: 14px; background: #111; border: 1px solid #222; position: relative; overflow: hidden; }
    .milestone-fill { position: absolute; top: 0; left: 0; bottom: 0; background: linear-gradient(90deg, #663300, #ffcc00); transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }
    .milestone-fill.done { background: linear-gradient(90deg, #336600, #44ff44); }
    .milestone-pct { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 5px; color: #000; font-family: 'Press Start 2P', monospace; z-index: 1; }
    .milestone-sub { display: flex; justify-content: space-between; margin-top: 3px; font-size: clamp(4px, 0.55vw, 5px); color: #888; letter-spacing: 1px; }
    .milestone-dots { display: flex; gap: 4px; margin-top: 6px; justify-content: center; }
    .milestone-dot { width: 6px; height: 6px; border: 1px solid #555; background: #222; }
    .milestone-dot.cleared { background: #ffcc00; border-color: #ffcc00; }
    .milestone-dot.current { border-color: #ffcc00; animation: dot-pulse 1s ease-in-out infinite alternate; }
    @keyframes dot-pulse { from{box-shadow:none} to{box-shadow:0 0 6px #ffcc00} }

    /* Bottom grid */
    .bottom-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 0.6rem; margin-top: 0.5rem; }
    @media (max-width: 500px) { .bottom-grid { grid-template-columns: 1fr; } }
    .panel { border: 1px solid #1a1a1a; background: #060606; padding: 8px 10px; }
    .panel-title { font-size: clamp(4px, 0.7vw, 5px); color: #999; letter-spacing: 2px; margin-bottom: 6px; text-align: center; }

    /* Battle */
    .battle-row { display: flex; justify-content: center; align-items: baseline; gap: 14px; margin-bottom: 4px; }
    .battle-name { font-size: clamp(4px, 0.7vw, 6px); color: #aaa; margin-bottom: 4px; }
    .battle-val { font-size: clamp(11px, 1.8vw, 14px); color: #ccc; margin-top: 2px; }
    .battle-val.win { color: #ffcc00; }
    .battle-val.lose { color: #777; }
    .battle-vs { font-size: clamp(6px, 1vw, 8px); color: #777; }
    .battle-verdict { text-align: center; font-size: clamp(6px, 1vw, 8px); color: #ffcc00; letter-spacing: 1px; }
    .battle-verdict.lose { color: #888; }
    .combo-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 6px; }
    .combo-num { font-size: clamp(12px, 2vw, 16px); color: #ffcc00; }
    .combo-text { font-size: clamp(5px, 0.8vw, 7px); color: #cc9933; letter-spacing: 1px; }
    .combo-row.hot .combo-num { text-shadow: 0 0 16px rgba(255,204,0,0.5); animation: combo-pulse 0.5s ease-in-out infinite alternate; }
    @keyframes combo-pulse { from{transform:scale(1)} to{transform:scale(1.06)} }

    /* Predict */
    .predict-date { text-align: center; font-size: clamp(9px, 1.5vw, 12px); color: #ffcc00; margin-bottom: 3px; }
    .predict-date.bad { color: #aa4444; }
    .predict-sub { text-align: center; font-size: clamp(4px, 0.6vw, 5px); color: #888; letter-spacing: 1px; }

    /* Chart */
    .chart-wrap { position: relative; width: 100%; height: 110px; }

    /* Status */
    .status { text-align: center; margin-top: 0.6rem; }
    .status-main { font-size: clamp(16px, 3.5vw, 26px); color: #ffcc00; letter-spacing: 4px; animation: glow 2.5s ease-in-out infinite alternate; }
    .status-main.ko { font-size: clamp(22px, 5vw, 36px); animation: ko-flash 0.4s steps(2) infinite; }
    @keyframes glow { from{text-shadow:2px 2px 0 #663300} to{text-shadow:2px 2px 0 #663300, 0 0 24px rgba(255,204,0,0.3)} }
    @keyframes ko-flash { 0%{text-shadow:0 0 20px #ffcc00} 50%{text-shadow:0 0 40px #ff9900} 100%{text-shadow:0 0 20px #ffcc00} }
    .status-sub { margin-top: 4px; font-size: clamp(4px, 0.7vw, 6px); color: #999; letter-spacing: 2px; }

    /* Bottom bar */
    .bottom-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
    #refreshBtn { padding: 8px 16px; font-family: 'Press Start 2P', monospace; font-size: clamp(6px, 1vw, 8px); color: #000; background: #ffcc00; border: none; cursor: pointer; letter-spacing: 2px; box-shadow: 0 3px 0 #996600; transition: transform 0.08s, box-shadow 0.08s; }
    #refreshBtn:hover { background: #ffe566; }
    #refreshBtn:active { transform: translateY(2px); box-shadow: 0 1px 0 #996600; }
    #refreshBtn:disabled { background: #222; color: #555; box-shadow: 0 1px 0 #111; cursor: not-allowed; }
    .footer { font-size: clamp(4px, 0.6vw, 5px); color: #777; letter-spacing: 1px; }
    .live-dot { display: inline-block; width: 4px; height: 4px; background: #ffcc00; border-radius: 50%; margin-right: 3px; animation: pulse 1.5s ease-in-out infinite; vertical-align: middle; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* History table */
    .history-toggle { display: block; width: 100%; margin-top: 0.5rem; padding: 6px; font-family: 'Press Start 2P', monospace; font-size: clamp(5px, 0.8vw, 7px); color: #999; background: #060606; border: 1px solid #333; cursor: pointer; text-align: center; letter-spacing: 2px; }
    .history-toggle:hover { color: #ffcc00; border-color: #333; }
    .history-wrap { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; border: 1px solid #1a1a1a; border-top: none; }
    .history-wrap.open { max-height: 500px; overflow-y: auto; }
    .history-table { width: auto; margin: 0 auto; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    .history-table th, .history-table td { padding: 3px 8px; font-size: clamp(5px, 0.75vw, 7px); text-align: right; white-space: nowrap; }
    .history-table th { color: #999; letter-spacing: 1px; position: sticky; top: 0; background: #060606; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .history-table td { color: #aaa; border-bottom: 1px solid #1a1a1a; }
    .history-table td.date-col { text-align: left; color: #888; }
    .history-table td.win { color: #ffcc00; font-weight: bold; }
    .history-table td.lose { color: #777; }
    .history-table tr:hover td { color: #888; }
    .history-table tr:hover td.win { color: #ffcc00; }
    .history-table tr:hover td.lose { color: #999; }
  </style>
</head>
<body>
  <div class="page" id="mainContainer">
    <div class="title">
      <span class="title-main">LINKEDIN FIGHTER II</span>
      <span class="title-sub">THE FOLLOWERS WAR</span>
    </div>

    <div class="hud">
      <div class="hud-side">
        <span class="hud-name">CHRIS</span>
        <div class="hp-bar"><div class="hp-fill chris-hp" id="chrisHp" style="width:100%"></div></div>
      </div>
      <div class="hud-vs">VS</div>
      <div class="hud-side">
        <span class="hud-name right">RUBEN</span>
        <div class="hp-bar"><div class="hp-fill ruben-hp" id="rubenHp" style="width:0%"></div></div>
      </div>
    </div>

    <div class="arena" id="arena">
      <div class="fighter-side left" id="fighterChris">
        <div class="fighter-label">
          <div class="count" id="chrisCount">—</div>
          <div class="daily" id="chrisDaily"></div>
        </div>
        <img src="https://www.muraldecal.com/en/img/arc244-png/folder/products-detalle-png/stickers-street-fighter-ryu-pixel-16-bits.png" alt="RYU">
      </div>
      <div class="fighter-side right" id="fighterRuben">
        <div class="fighter-label">
          <div class="count" id="rubenCount">—</div>
          <div class="daily" id="rubenDaily"></div>
        </div>
        <img src="https://www.muraldecal.com/en/img/arc243-png/folder/products-detalle-png/stickers-street-fighter-ken-pixel-16-bits.png" alt="KEN">
      </div>
      <div class="hit-effect" id="hitEffect"></div>
    </div>
    <div class="gap-row">
      <span class="gap-row-num" id="gapNum">—</span>
      <span class="gap-row-lbl">GAP</span>
    </div>

    <div class="milestone-bar" id="milestoneBar"></div>

    <div class="bottom-grid">
      <div>
        <div class="panel" style="margin-bottom:0.6rem">
          <div class="panel-title">TODAY'S BATTLE</div>
          <div class="battle-row">
            <div style="text-align:center"><div class="battle-name">CHRIS</div><div class="battle-val" id="battleChris">—</div></div>
            <span class="battle-vs">VS</span>
            <div style="text-align:center"><div class="battle-name">RUBEN</div><div class="battle-val" id="battleRuben">—</div></div>
          </div>
          <div class="battle-verdict" id="battleVerdict"></div>
          <div class="combo-row" id="comboRow" style="display:none">
            <span class="combo-num" id="comboNum"></span>
            <span class="combo-text" id="comboText"></span>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">OVERTAKE DAY</div>
          <div class="predict-date" id="predictDate">—</div>
          <div class="predict-sub" id="predictSub">LOADING...</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">GAP HISTORY</div>
        <div class="chart-wrap"><canvas id="gapChart"></canvas></div>
      </div>
    </div>

    <div class="status">
      <div class="status-main" id="statusMain">FIGHT!</div>
      <div class="status-sub" id="statusSub"></div>
    </div>

    <div class="bottom-bar">
      <button id="refreshBtn">▶ REFRESH ◀</button>
      <div class="footer" id="footer"></div>
    </div>

    <button class="history-toggle" id="historyToggle">▼ BATTLE LOG ▼</button>
    <div class="history-wrap" id="historyWrap">
      <table class="history-table">
        <thead><tr><th style="text-align:left">DATE</th><th>CHRIS</th><th>+/-</th><th>RUBEN</th><th>+/-</th><th>GAP</th><th>NET</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SHEET_ID = '1j_Z8JuukkskQlfgsIzZgiX_XoSGu_rzNuCGLu_asZuo';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const PROXIES = [
      'https://corsproxy.io/?' + encodeURIComponent(CSV_URL),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL),
    ];

    async function fetchWithTimeout(url, ms = 9000) {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), ms);
      try { const r = await fetch(url, { signal: ctrl.signal }); clearTimeout(tid); return r; }
      catch (e) { clearTimeout(tid); throw e; }
    }

    function parseNum(s) {
      if (!s) return null;
      s = String(s);
      if (s.includes('\u2014') || s.trim() === '-' || s.trim() === '') return null;
      const n = parseInt(s.replace(/[^0-9-]/g, ''));
      return isNaN(n) ? null : n;
    }

    function fmt(n) { return Math.abs(Math.round(n)).toLocaleString(); }
    function addDays(d, days) { const r = new Date(d); r.setDate(r.getDate() + Math.ceil(days)); return r; }
    function fmtDate(d) { return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase(); }

    async function fetchFromGviz() {
      const r = await fetchWithTimeout(GVIZ_URL);
      if (!r.ok) throw new Error('gviz HTTP ' + r.status);
      const text = await r.text();
      const match = text.match(/setResponse\((\{[\s\S]+\})\)/);
      if (!match) throw new Error('gviz: unexpected format');
      const data = JSON.parse(match[1]);
      if (data.status !== 'ok') throw new Error('gviz status: ' + data.status);
      const rows = [];
      for (const row of data.table.rows) {
        if (!row || !row.c) continue;
        const v = (i) => (row.c[i] && row.c[i].v !== undefined) ? row.c[i].v : null;
        const f = (i) => (row.c[i] && row.c[i].f !== undefined) ? row.c[i].f : v(i);
        const chris = typeof v(2) === 'number' ? v(2) : parseNum(f(2));
        const ruben = typeof v(4) === 'number' ? v(4) : parseNum(f(4));
        if (!chris || !ruben) continue;
        const num = (i) => typeof v(i) === 'number' ? v(i) : parseNum(f(i));
        const rawDate = f(0) || '';
        const dateStr = (typeof rawDate === 'string' && rawDate && !rawDate.startsWith('Date(')) ? rawDate : '';
        rows.push({ date: dateStr, hour: String(f(1) || v(1) || ''), chris, chris_daily: num(3), ruben, ruben_daily: num(5), gap: num(6), growth_diff: num(7) });
      }
      return rows;
    }

    function parseCSV(text) {
      return text.trim().split('\n').map(line => {
        const fields = []; let inQ = false, f = '';
        for (const ch of line) { if (ch === '"') { inQ = !inQ; continue; } if (ch === ',' && !inQ) { fields.push(f.trim()); f = ''; continue; } f += ch; }
        fields.push(f.trim()); return fields;
      });
    }

    function processCSVRows(rows) {
      const data = [];
      for (const row of rows.slice(1)) {
        const chris = parseNum(row[2]), ruben = parseNum(row[4]);
        if (!chris || !ruben) continue;
        data.push({ date: row[0] || '', hour: row[1] || '', chris, chris_daily: parseNum(row[3]), ruben, ruben_daily: parseNum(row[5]), gap: parseNum(row[6]), growth_diff: parseNum(row[7]) });
      }
      return data;
    }

    function calcOvertake(rows, gap) {
      const diffs = rows.map(r => r.growth_diff).filter(d => d != null);
      if (!diffs.length) return null;
      const d = diffs[diffs.length - 1];
      if (d <= 0) return { type: 'losing', avg: d };
      return { type: 'winning', days: gap / d, avg: d, date: addDays(new Date(), gap / d) };
    }

    function calcCombo(rows) {
      let s = 0;
      for (let i = rows.length - 1; i >= 0; i--) { const d = rows[i].growth_diff; if (d == null) continue; if (d > 0) s++; else break; }
      return s;
    }

    let chart = null;
    function renderGapChart(rows) {
      const pts = rows.filter(r => r.gap != null && r.date).map(r => ({ x: r.date, y: r.gap }));
      if (pts.length < 2) return;
      if (chart) { chart.destroy(); chart = null; }
      chart = new Chart(document.getElementById('gapChart'), {
        type: 'line',
        data: { datasets: [{ data: pts, borderColor: '#ffcc00', backgroundColor: 'rgba(255,204,0,0.04)', borderWidth: 1.5, pointRadius: 0, pointHitRadius: 10, pointHoverRadius: 3, pointHoverBackgroundColor: '#ffcc00', fill: true, tension: 0.3 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'nearest', intersect: false },
          plugins: { legend: { display: false }, tooltip: { backgroundColor: '#111', borderColor: '#222', borderWidth: 1, titleFont: { family: "'Press Start 2P'", size: 5 }, bodyFont: { family: "'Press Start 2P'", size: 7 }, titleColor: '#aaa', bodyColor: '#ffcc00', padding: 6, displayColors: false, callbacks: { title: i => i[0]?.raw?.x || '', label: i => 'GAP: ' + fmt(i.raw.y) } } },
          scales: {
            x: { type: 'category', ticks: { color: '#777', font: { family: "'Press Start 2P'", size: 4 }, maxTicksLimit: 5, maxRotation: 0 }, grid: { color: '#0d0d0d' }, border: { color: '#1a1a1a' } },
            y: { ticks: { color: '#888', font: { family: "'Press Start 2P'", size: 5 }, callback: v => fmt(v) }, grid: { color: '#0d0d0d' }, border: { color: '#1a1a1a' } }
          }
        }
      });
    }

    function renderHistory(rows) {
      const body = document.getElementById('historyBody');
      let html = '';
      for (let i = rows.length - 1; i >= 0; i--) {
        const r = rows[i];
        const cd = r.chris_daily, rd = r.ruben_daily, gd = r.growth_diff;
        const winCls = gd != null ? (gd > 0 ? 'win' : gd < 0 ? 'lose' : '') : '';
        html += `<tr>
          <td class="date-col">${r.date}</td>
          <td>${fmt(r.chris)}</td>
          <td>${cd != null ? (cd >= 0 ? '+' : '') + fmt(cd) : '—'}</td>
          <td>${fmt(r.ruben)}</td>
          <td>${rd != null ? (rd >= 0 ? '+' : '') + fmt(rd) : '—'}</td>
          <td>${r.gap != null ? fmt(r.gap) : '—'}</td>
          <td class="${winCls}">${gd != null ? (gd > 0 ? '+' : '') + fmt(gd) : '—'}</td>
        </tr>`;
      }
      body.innerHTML = html;
    }

    function triggerHit(diff) {
      const el = document.getElementById('hitEffect');
      const container = document.getElementById('mainContainer');
      const c = document.getElementById('fighterChris'), r = document.getElementById('fighterRuben');
      el.textContent = diff > 0 ? 'HIT!' : 'BLOCK!';
      if (diff > 0) { c.classList.add('hurt'); r.classList.add('hit'); } else { r.classList.add('hurt'); c.classList.add('hit'); }
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
      container.classList.remove('shake'); void container.offsetWidth; container.classList.add('shake');
      setTimeout(() => { c.classList.remove('hit','hurt'); r.classList.remove('hit','hurt'); }, 500);
    }

    const MILESTONES = [
      { target: 800000, label: '800K', round: 'ROUND 1' },
      { target: 850000, label: '850K', round: 'ROUND 2' },
      { target: 900000, label: '900K', round: 'ROUND 3' },
      { target: 950000, label: '950K', round: 'ROUND 4' },
      { target: 1000000, label: '1M', round: 'ROUND 5' },
    ];

    function fillMissingDailies(rows) {
      for (let i = 1; i < rows.length; i++) {
        const prev = rows[i - 1], cur = rows[i];
        if (cur.chris_daily == null && prev.chris != null) cur.chris_daily = cur.chris - prev.chris;
        if (cur.ruben_daily == null && prev.ruben != null) cur.ruben_daily = cur.ruben - prev.ruben;
        if (cur.growth_diff == null && cur.ruben_daily != null && cur.chris_daily != null) cur.growth_diff = cur.ruben_daily - cur.chris_daily;
        if (cur.gap == null && cur.chris != null && cur.ruben != null) cur.gap = cur.chris - cur.ruben;
      }
    }

    let firstRender = true;
    function renderUI(rows) {
      if (!rows.length) return;
      fillMissingDailies(rows);
      const d = rows[rows.length - 1];
      const { chris, ruben, gap, date, hour, chris_daily, ruben_daily, growth_diff } = d;

      document.getElementById('chrisCount').textContent = fmt(chris);
      document.getElementById('rubenCount').textContent = fmt(ruben);
      if (chris_daily != null) { const el = document.getElementById('chrisDaily'); el.textContent = (chris_daily >= 0 ? '+' : '') + fmt(chris_daily) + '/DAY'; el.className = 'daily ' + (chris_daily > 0 ? 'up' : ''); }
      if (ruben_daily != null) { const el = document.getElementById('rubenDaily'); el.textContent = (ruben_daily >= 0 ? '+' : '') + fmt(ruben_daily) + '/DAY'; el.className = 'daily ' + (ruben_daily > 0 ? 'up' : ''); }

      // HP bars: Chris HP = gap remaining / initial gap. Ruben HP = damage dealt.
      const initialGap = rows[0].gap || gap;
      const chrisPct = Math.min(100, Math.max(0, (gap / initialGap) * 100));
      const rubenPct = 100 - chrisPct;
      document.getElementById('chrisHp').style.width = chrisPct + '%';
      document.getElementById('rubenHp').style.width = rubenPct + '%';
      if (chrisPct < 20) document.getElementById('chrisHp').classList.add('critical');
      else document.getElementById('chrisHp').classList.remove('critical');

      // Milestones
      const currentIdx = MILESTONES.findIndex(m => ruben < m.target);
      const active = currentIdx >= 0 ? MILESTONES[currentIdx] : null;
      const prevTarget = currentIdx > 0 ? MILESTONES[currentIdx - 1].target : (MILESTONES.length > 0 ? 750000 : ruben);
      const mBar = document.getElementById('milestoneBar');
      if (active) {
        const pct = Math.min(100, Math.max(0, ((ruben - prevTarget) / (active.target - prevTarget)) * 100));
        const remaining = active.target - ruben;
        const dots = MILESTONES.map((m, i) => `<div class="milestone-dot ${i < currentIdx ? 'cleared' : i === currentIdx ? 'current' : ''}"></div>`).join('');
        mBar.innerHTML = `
          <div class="milestone-header">
            <span class="milestone-round">${active.round}</span>
            <span class="milestone-target">NEXT: ${active.label}</span>
          </div>
          <div class="milestone-track">
            <div class="milestone-fill" style="width:${pct}%"></div>
            <span class="milestone-pct">${Math.round(pct)}%</span>
          </div>
          <div class="milestone-sub">
            <span>${fmt(prevTarget)}</span>
            <span>${fmt(remaining)} TO GO</span>
            <span>${active.label}</span>
          </div>
          <div class="milestone-dots">${dots}</div>`;
      } else {
        const dots = MILESTONES.map(() => `<div class="milestone-dot cleared"></div>`).join('');
        mBar.innerHTML = `
          <div class="milestone-header">
            <span class="milestone-round">FINAL BOSS</span>
            <span class="milestone-target">OVERTAKE CHRIS</span>
          </div>
          <div class="milestone-track">
            <div class="milestone-fill done" style="width:${Math.min(100, (ruben / chris) * 100)}%"></div>
          </div>
          <div class="milestone-dots">${dots}<div class="milestone-dot current"></div></div>`;
      }

      document.getElementById('gapNum').textContent = fmt(Math.abs(gap));

      // Battle
      const bC = document.getElementById('battleChris'), bR = document.getElementById('battleRuben'), bV = document.getElementById('battleVerdict');
      if (chris_daily != null && ruben_daily != null) {
        bC.textContent = '+' + fmt(chris_daily); bR.textContent = '+' + fmt(ruben_daily);
        if (growth_diff > 0) { bR.className = 'battle-val win'; bC.className = 'battle-val lose'; bV.textContent = 'RUBEN WINS +' + fmt(ruben_daily - chris_daily) + ' NET'; bV.className = 'battle-verdict'; }
        else if (growth_diff < 0) { bC.className = 'battle-val win'; bR.className = 'battle-val lose'; bV.textContent = 'CHRIS TAKES THIS ROUND'; bV.className = 'battle-verdict lose'; }
        else { bC.className = bR.className = 'battle-val'; bV.textContent = 'DRAW'; bV.className = 'battle-verdict'; }
      }

      const combo = calcCombo(rows);
      const cr = document.getElementById('comboRow');
      if (combo >= 2) { cr.style.display = 'flex'; document.getElementById('comboNum').textContent = combo; document.getElementById('comboText').textContent = combo >= 10 ? 'ULTRA COMBO!' : combo >= 5 ? 'SUPER COMBO!' : 'DAY STREAK'; cr.className = combo >= 5 ? 'combo-row hot' : 'combo-row'; }
      else { cr.style.display = 'none'; }

      renderGapChart(rows);
      renderHistory(rows);

      const p = calcOvertake(rows, gap);
      const dateEl = document.getElementById('predictDate'), subEl = document.getElementById('predictSub');
      if (!p) { dateEl.textContent = '?'; dateEl.className = 'predict-date bad'; subEl.textContent = 'NOT ENOUGH DATA'; }
      else if (gap <= 0) { dateEl.textContent = 'DEFEATED!'; dateEl.className = 'predict-date'; subEl.textContent = 'RUBEN HAS OVERTAKEN CHRIS'; }
      else if (p.type === 'losing') { dateEl.textContent = 'NEVER AT THIS PACE'; dateEl.className = 'predict-date bad'; subEl.textContent = fmt(Math.abs(p.avg)) + '/DAY BEHIND TODAY'; }
      else { dateEl.textContent = fmtDate(p.date); dateEl.className = 'predict-date'; subEl.textContent = Math.ceil(p.days) + ' DAYS  ·  +' + fmt(p.avg) + '/DAY NET'; }

      const main = document.getElementById('statusMain'), sub = document.getElementById('statusSub');
      main.className = 'status-main';
      if (gap <= 0) { main.textContent = 'K.O.!'; main.className = 'status-main ko'; sub.textContent = 'FLAWLESS VICTORY'; }
      else { const pct = (gap / chris) * 100; if (pct > 45) { main.textContent = 'FIGHT!'; sub.textContent = growth_diff > 0 ? 'RUBEN IS CLOSING THE GAP' : 'CHRIS PULLS AHEAD'; } else if (pct > 15) { main.textContent = 'CLOSING IN!'; sub.textContent = 'THE GAP IS SHRINKING'; } else { main.textContent = 'FINISH HIM!'; sub.textContent = 'CHRIS IS ON THE ROPES'; } }

      if (firstRender && growth_diff != null) { setTimeout(() => triggerHit(growth_diff), 600); firstRender = false; }
      document.getElementById('footer').innerHTML = `<span class="live-dot"></span>LIVE &nbsp; ${date} ${hour}`;
    }

    async function loadLive() {
      try { const rows = await fetchFromGviz(); if (rows.length) { renderUI(rows); return; } } catch (e) { console.warn('gviz:', e.message); }
      for (const url of PROXIES) { try { const r = await fetchWithTimeout(url); if (!r.ok) continue; const rows = processCSVRows(parseCSV(await r.text())); if (rows.length) { renderUI(rows); return; } } catch (e) { console.warn('proxy:', e.message); } }
      try { const r = await fetchWithTimeout('./data.json?t=' + Date.now()); const d = await r.json(); renderUI(d.history || [d.latest]); } catch (e) { document.getElementById('statusMain').textContent = 'ERROR'; }
    }

    document.getElementById('refreshBtn').addEventListener('click', () => {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true; btn.textContent = '...';
      firstRender = true;
      loadLive().finally(() => { btn.disabled = false; btn.textContent = '▶ REFRESH ◀'; });
    });

    document.getElementById('historyToggle').addEventListener('click', () => {
      const wrap = document.getElementById('historyWrap');
      const btn = document.getElementById('historyToggle');
      wrap.classList.toggle('open');
      btn.textContent = wrap.classList.contains('open') ? '▲ BATTLE LOG ▲' : '▼ BATTLE LOG ▼';
    });

    loadLive();
    setInterval(loadLive, 10 * 60 * 1000);
  </script>
</body>
</html>
