<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINKEDIN FIGHTER II</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      background: radial-gradient(ellipse at 50% 30%, #0d001a 0%, #000 70%);
    }

    /* CRT scanlines — pointer-events:none so they never block clicks */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(95vw, 700px);
      padding: 1.5rem 2rem;
    }

    /* Title */
    .title { text-align: center; margin-bottom: 2.5rem; }
    .title-main {
      display: block;
      font-size: clamp(18px, 4.5vw, 34px);
      color: #ffcc00;
      text-shadow: 3px 3px 0 #cc8800, 5px 5px 0 #995500, 7px 7px 0 #662200;
      letter-spacing: 3px;
      margin-bottom: 0.6rem;
    }
    .title-sub {
      display: block;
      font-size: clamp(7px, 1.4vw, 10px);
      color: #884400;
      letter-spacing: 4px;
    }

    /* Fighter labels */
    .fighter-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .lbl { font-size: clamp(10px, 2.2vw, 16px); letter-spacing: 2px; }
    .lbl-chris { color: #44aaff; }
    .lbl-ruben { color: #ff4444; }

    /* Health bar */
    .bar-wrapper {
      border: 3px solid #ffcc00;
      padding: 3px;
      background: #111;
      box-shadow: 0 0 0 2px #000, 0 0 24px rgba(255,204,0,0.35);
      margin-bottom: 1.8rem;
    }
    .bar-track {
      height: 36px;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }
    .bar-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg, transparent, transparent calc(10% - 1px),
        rgba(0,0,0,0.45) calc(10% - 1px), rgba(0,0,0,0.45) 10%
      );
      z-index: 2;
      pointer-events: none;
    }
    .bar-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0;
      background: linear-gradient(90deg, #005500 0%, #009933 40%, #00cc55 75%, #44ff88 100%);
      transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }
    .bar-fill.warning {
      background: linear-gradient(90deg, #553300 0%, #aa6600 40%, #ddaa00 75%, #ffdd44 100%);
    }
    .bar-fill.danger {
      background: linear-gradient(90deg, #550000 0%, #aa2200 40%, #dd4400 75%, #ff7744 100%);
      animation: flicker 0.4s steps(2) infinite;
    }
    @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.6} }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .stat { display: flex; flex-direction: column; gap: 5px; }
    .stat.right { text-align: right; }
    .stat-label { font-size: clamp(5px,1vw,7px); color: #555; letter-spacing: 1px; }
    .stat-count { font-size: clamp(11px,2.2vw,16px); color: #fff; }
    .stat-daily { font-size: clamp(6px,1.1vw,8px); min-height: 1em; }
    .stat-daily.up   { color: #44ff44; }
    .stat-daily.down { color: #ff4444; }
    .stat-daily.flat { color: #555; }
    .gap-center { text-align: center; }
    .gap-num { font-size: clamp(13px,2.8vw,20px); color: #ffcc00; }
    .gap-lbl  { font-size: clamp(5px,0.9vw,7px); color: #555; letter-spacing: 1px; margin-top: 5px; }

    /* Overtake prediction box */
    .predict-box {
      border: 1px solid #333;
      padding: 14px;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .predict-label {
      font-size: clamp(5px, 0.9vw, 7px);
      color: #555;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .predict-date {
      font-size: clamp(12px, 2.5vw, 18px);
      color: #44ff44;
      margin-bottom: 6px;
    }
    .predict-date.bad { color: #ff4444; }
    .predict-sub {
      font-size: clamp(5px, 0.9vw, 7px);
      color: #555;
      letter-spacing: 1px;
    }

    /* Divider */
    .divider { height: 1px; background: linear-gradient(90deg, transparent, #2a2a2a, transparent); margin: 0 0 1.5rem; }

    /* Status */
    .status { text-align: center; margin-bottom: 1.5rem; }
    .status-main {
      font-size: clamp(20px, 5vw, 36px);
      color: #ffcc00;
      letter-spacing: 5px;
      animation: glow 2.5s ease-in-out infinite alternate;
    }
    .status-main.ko {
      color: #ff0000;
      font-size: clamp(28px, 7vw, 52px);
      animation: ko-flash 0.4s steps(2) infinite;
    }
    @keyframes glow {
      from { text-shadow: 2px 2px 0 #996600; }
      to   { text-shadow: 2px 2px 0 #996600, 0 0 40px rgba(255,204,0,.5); }
    }
    @keyframes ko-flash {
      0%  { color:#ff0000; text-shadow:0 0 30px #ff0000; }
      50% { color:#ffcc00; text-shadow:0 0 40px #ffaa00; }
      100%{ color:#ff0000; text-shadow:0 0 30px #ff0000; }
    }
    .status-sub { margin-top: 10px; font-size: clamp(6px,1.1vw,8px); color: #555; letter-spacing: 2px; }

    /* Refresh button */
    #refreshBtn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      margin-bottom: 1.5rem;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 2vw, 14px);
      color: #000;
      background: #ffcc00;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 6px 0 #996600, 0 8px 20px rgba(0,0,0,0.6);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #refreshBtn:hover { background: #ffe566; }
    #refreshBtn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #996600;
    }
    #refreshBtn:disabled {
      background: #333;
      color: #666;
      box-shadow: 0 2px 0 #111;
      cursor: not-allowed;
    }

    /* Live dot */
    .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #44ff44;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .footer { text-align: center; font-size: clamp(5px, 0.85vw, 7px); color: #2a2a2a; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <span class="title-main">LINKEDIN FIGHTER II</span>
      <span class="title-sub">THE FOLLOWERS WAR</span>
    </div>

    <div class="fighter-labels">
      <span class="lbl lbl-chris">CHRIS</span>
      <span class="lbl lbl-ruben">RUBEN</span>
    </div>

    <div class="bar-wrapper">
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">CHRIS FOLLOWERS</span>
        <span class="stat-count" id="chrisCount">—</span>
        <span class="stat-daily flat" id="chrisDaily"></span>
      </div>
      <div class="gap-center">
        <div class="gap-num" id="gapNum">—</div>
        <div class="gap-lbl" id="gapLbl">GAP</div>
      </div>
      <div class="stat right">
        <span class="stat-label">RUBEN FOLLOWERS</span>
        <span class="stat-count" id="rubenCount">—</span>
        <span class="stat-daily flat" id="rubenDaily"></span>
      </div>
    </div>

    <div class="predict-box">
      <div class="predict-label">OVERTAKE DAY</div>
      <div class="predict-date" id="predictDate">—</div>
      <div class="predict-sub" id="predictSub">LOADING DATA...</div>
    </div>

    <div class="divider"></div>

    <div class="status">
      <div class="status-main" id="statusMain">LOADING...</div>
      <div class="status-sub" id="statusSub"></div>
    </div>

    <button id="refreshBtn">▶ PRESS START TO WIN ◀</button>
    <div class="footer" id="footer"></div>
  </div>

  <script>
    const SHEET_ID = '1j_Z8JuukkskQlfgsIzZgiX_XoSGu_rzNuCGLu_asZuo';

    // Google's own gviz API — works with CORS for publicly shared sheets
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    // Fallback proxies if gviz is blocked
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const PROXIES = [
      'https://corsproxy.io/?' + encodeURIComponent(CSV_URL),
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(CSV_URL),
    ];

    /* ── helpers ── */
    async function fetchWithTimeout(url, ms = 9000) {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), ms);
      try   { const r = await fetch(url, { signal: ctrl.signal }); clearTimeout(tid); return r; }
      catch (e) { clearTimeout(tid); throw e; }
    }

    function parseNum(s) {
      if (!s) return null;
      s = String(s);
      if (s.includes('\u2014') || s.trim() === '-' || s.trim() === '') return null;
      const n = parseInt(s.replace(/[^0-9-]/g, ''));
      return isNaN(n) ? null : n;
    }

    function fmt(n) { return Math.abs(Math.round(n)).toLocaleString(); }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + Math.ceil(days));
      return d;
    }

    function fmtDate(d) {
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
    }

    /* ── gviz JSON parser (Google's own API, best CORS support) ── */
    async function fetchFromGviz() {
      const r = await fetchWithTimeout(GVIZ_URL);
      if (!r.ok) throw new Error('gviz HTTP ' + r.status);
      const text = await r.text();

      // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
      const match = text.match(/setResponse\((\{[\s\S]+\})\)/);
      if (!match) throw new Error('gviz: unexpected response format');
      const data = JSON.parse(match[1]);
      if (data.status !== 'ok') throw new Error('gviz status: ' + data.status);

      const rows = [];
      for (const row of data.table.rows) {
        if (!row || !row.c) continue;
        const v = (i) => (row.c[i] && row.c[i].v !== undefined) ? row.c[i].v : null;
        const f = (i) => (row.c[i] && row.c[i].f !== undefined) ? row.c[i].f : v(i);

        // Numbers come back as JS numbers from gviz — perfect
        const chris = typeof v(2) === 'number' ? v(2) : parseNum(f(2));
        const ruben = typeof v(4) === 'number' ? v(4) : parseNum(f(4));
        if (!chris || !ruben) continue;

        const num = (i) => typeof v(i) === 'number' ? v(i) : parseNum(f(i));

        // f(0) is the formatted date string (e.g. "18/03/2026"); v(0) may be a raw gviz Date object
        const rawDate = f(0) || '';
        const dateStr = (typeof rawDate === 'string' && rawDate && !rawDate.startsWith('Date(')) ? rawDate : '';
        rows.push({
          date:        dateStr,
          hour:        String(f(1) || v(1) || ''),
          chris,
          chris_daily: num(3),
          ruben,
          ruben_daily: num(5),
          gap:         num(6),
          growth_diff: num(7),
        });
      }
      return rows;
    }

    /* ── CSV parser fallback ── */
    function parseCSV(text) {
      return text.trim().split('\n').map(line => {
        const fields = [];
        let inQ = false, f = '';
        for (const ch of line) {
          if (ch === '"') { inQ = !inQ; continue; }
          if (ch === ',' && !inQ) { fields.push(f.trim()); f = ''; continue; }
          f += ch;
        }
        fields.push(f.trim());
        return fields;
      });
    }

    function processCSVRows(rows) {
      const data = [];
      for (const row of rows.slice(1)) {
        const chris = parseNum(row[2]);
        const ruben = parseNum(row[4]);
        if (!chris || !ruben) continue;
        data.push({
          date:        row[0] || '',
          hour:        row[1] || '',
          chris,
          chris_daily: parseNum(row[3]),
          ruben,
          ruben_daily: parseNum(row[5]),
          gap:         parseNum(row[6]),
          growth_diff: parseNum(row[7]),
        });
      }
      return data;
    }

    /* ── prediction ── */
    function calcOvertake(rows, currentGap) {
      // growth_diff = ruben_daily - chris_daily
      // Use the latest available growth_diff (today's numbers), not a historical average
      const validDiffs = rows
        .map(r => r.growth_diff)
        .filter(d => d !== null && d !== undefined);

      if (validDiffs.length === 0) return null;

      // Use latest non-null growth_diff — this matches what the user sees (+800 - +274 = +526)
      const avg = validDiffs[validDiffs.length - 1];

      if (avg <= 0) {
        return { type: 'losing', avg };
      }

      const days = currentGap / avg;
      return { type: 'winning', days, avg, date: addDays(new Date(), days) };
    }

    function renderPrediction(rows, gap) {
      const p = calcOvertake(rows, gap);
      const dateEl = document.getElementById('predictDate');
      const subEl  = document.getElementById('predictSub');

      if (!p) {
        dateEl.textContent = '?';
        dateEl.className = 'predict-date bad';
        subEl.textContent = 'NOT ENOUGH DATA YET';
        return;
      }

      if (p.type === 'losing') {
        dateEl.textContent = 'NEVER AT THIS PACE';
        dateEl.className = 'predict-date bad';
        subEl.textContent = `AVG ${fmt(Math.abs(p.avg))} FOLLOWERS/DAY BEHIND`;
      } else {
        dateEl.textContent = fmtDate(p.date);
        dateEl.className = 'predict-date';
        subEl.textContent = `IN ${Math.ceil(p.days)} DAYS  ·  AVG +${fmt(p.avg)}/DAY ADVANTAGE`;
      }
    }

    /* ── render ── */
    function renderUI(rows) {
      if (!rows.length) return;
      const d = rows[rows.length - 1]; // latest row
      const { chris, ruben, gap, date, hour, chris_daily, ruben_daily, growth_diff } = d;

      const pct = Math.max(0, (gap / chris) * 100);

      document.getElementById('chrisCount').textContent = fmt(chris);
      document.getElementById('rubenCount').textContent = fmt(ruben);

      if (chris_daily !== null) {
        const el = document.getElementById('chrisDaily');
        el.textContent = (chris_daily >= 0 ? '+' : '') + fmt(chris_daily) + ' TODAY';
        el.className = 'stat-daily ' + (chris_daily > 0 ? 'up' : chris_daily < 0 ? 'down' : 'flat');
      }
      if (ruben_daily !== null) {
        const el = document.getElementById('rubenDaily');
        el.textContent = (ruben_daily >= 0 ? '+' : '') + fmt(ruben_daily) + ' TODAY';
        el.className = 'stat-daily ' + (ruben_daily > 0 ? 'up' : ruben_daily < 0 ? 'down' : 'flat');
      }

      const bar = document.getElementById('barFill');
      bar.style.width = pct + '%';
      bar.className = 'bar-fill';
      if      (pct <= 15) bar.classList.add('danger');
      else if (pct <= 45) bar.classList.add('warning');

      if (gap <= 0) {
        bar.style.width = '0%';
        document.getElementById('gapNum').textContent = fmt(Math.abs(gap));
        document.getElementById('gapLbl').textContent = 'RUBEN LEADS!';
        document.getElementById('gapLbl').style.color = '#44ff44';
        document.getElementById('statusMain').textContent = 'K.O.!';
        document.getElementById('statusMain').className = 'status-main ko';
        document.getElementById('statusSub').textContent = 'RUBEN WINS! FLAWLESS VICTORY!';
      } else {
        document.getElementById('gapNum').textContent = fmt(gap);
        document.getElementById('gapLbl').textContent = 'CHRIS LEADS';
        document.getElementById('gapLbl').style.color = '';

        const main = document.getElementById('statusMain');
        const sub  = document.getElementById('statusSub');
        main.className = 'status-main';
        if (pct > 45) {
          main.textContent = 'FIGHT!';
          sub.textContent  = growth_diff < 0 ? 'CHRIS IS PULLING AHEAD TODAY...' : 'RUBEN IS CLOSING THE GAP!';
        } else if (pct > 15) {
          main.textContent = 'CLOSING IN!';
          sub.textContent  = 'RUBEN IS GAINING GROUND!';
        } else {
          main.textContent = 'ALMOST THERE!';
          sub.textContent  = 'CHRIS IS ON THE ROPES!';
        }
      }

      renderPrediction(rows, gap);

      document.getElementById('footer').innerHTML =
        `<span class="live-dot"></span>LIVE &nbsp;&nbsp; LAST UPDATE: ${date}  ${hour}`;
    }

    /* ── fetch ── */
    async function loadLive() {
      // 1. Try Google's gviz API first (best CORS support, no third-party)
      try {
        const rows = await fetchFromGviz();
        if (rows.length) { renderUI(rows); return; }
      } catch (e) {
        console.warn('gviz failed:', e.message);
      }

      // 2. Try CSV proxies as fallback
      for (const url of PROXIES) {
        try {
          const r = await fetchWithTimeout(url);
          if (!r.ok) continue;
          const rows = processCSVRows(parseCSV(await r.text()));
          if (rows.length) { renderUI(rows); return; }
        } catch (e) {
          console.warn('Proxy failed:', e.message);
        }
      }

      // 3. Last resort: bundled data.json
      try {
        const r = await fetchWithTimeout('./data.json?t=' + Date.now());
        const d = await r.json();
        renderUI(d.history || [d.latest]);
      } catch (e) {
        document.getElementById('statusMain').textContent = 'ERROR';
        document.getElementById('statusSub').textContent = 'COULD NOT LOAD DATA';
      }
    }

    function manualRefresh() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '⏳ LOADING...';
      loadLive().finally(() => {
        btn.disabled = false;
        btn.textContent = '▶ PRESS START TO WIN ◀';
      });
    }

    document.getElementById('refreshBtn').addEventListener('click', manualRefresh);

    loadLive();
    setInterval(loadLive, 10 * 60 * 1000);
  </script>
</body>
</html>
