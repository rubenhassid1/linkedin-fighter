name: Update LinkedIn Follower Data

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily
    - cron: '30 12 * * *'  # 12:30 UTC daily (buffer)
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse Google Sheets data
        run: |
          python3 << 'PYEOF'
          import urllib.request, csv, json, io

          SHEET_ID = '1j_Z8JuukkskQlfgsIzZgiX_XoSGu_rzNuCGLu_asZuo'
          URL = f'https://docs.google.com/spreadsheets/d/{SHEET_ID}/export?format=csv'

          req = urllib.request.Request(URL, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req) as resp:
              content = resp.read().decode('utf-8')

          def parse_num(s):
              s = s.strip()
              if not s or '\u2014' in s or s == '-':
                  return None
              cleaned = ''.join(c for c in s if c.isdigit() or c == '-')
              return int(cleaned) if cleaned else None

          rows = list(csv.reader(io.StringIO(content)))
          data_rows = []
          for row in rows[1:]:
              if len(row) > 6 and row[2].strip() and row[2].strip() != '\u2014':
                  entry = {
                      'date':        row[0].strip(),
                      'hour':        row[1].strip(),
                      'chris':       parse_num(row[2]),
                      'chris_daily': parse_num(row[3]) if len(row) > 3 else None,
                      'ruben':       parse_num(row[4]) if len(row) > 4 else None,
                      'ruben_daily': parse_num(row[5]) if len(row) > 5 else None,
                      'gap':         parse_num(row[6]) if len(row) > 6 else None,
                      'growth_diff': parse_num(row[7]) if len(row) > 7 else None,
                  }
                  if entry['chris'] and entry['ruben']:
                      data_rows.append(entry)

          if not data_rows:
              print('No valid data rows found!')
              exit(1)

          # Preserve start_gap from the original data.json
          try:
              with open('data.json') as f:
                  existing = json.load(f)
              start_gap = existing.get('start_gap', data_rows[0]['gap'])
          except Exception:
              start_gap = data_rows[0]['gap']

          result = {
              'start_gap': start_gap,
              'latest':    data_rows[-1],
              'history':   data_rows,
          }

          with open('data.json', 'w') as f:
              json.dump(result, f, indent=2)

          l = data_rows[-1]
          print(f"Done — Chris: {l['chris']:,}  Ruben: {l['ruben']:,}  Gap: {l['gap']:,}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update follower data $(date -u +%Y-%m-%d)"
            git push
          fi
